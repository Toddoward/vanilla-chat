app:
  logo: static/images/logo_color.png
  logo_emoji_fallback: 🍨
  name: Vanilla Chat
context:
  summary_trigger: 0.8
  user_input_ratio: 0.2
extensions:
  cloud_providers: false
  collector: false
file_links:
  verify_interval_minutes: 10
inference:
  model_overrides: {}
  num_predict: 8192
  repeat_penalty: 1.1
  temperature: 0.05
  think: false
  top_p: 0.9
models:
  embedding: bge-m3
  orchestrator: qwen3.5:0.8b
  reranker: qllama\bge-reranker-v2-m3
  response: gemma3:4b
  vision: gemma3:4b
rag:
  chunk_overlap: 64
  chunk_size: 512
  top_k: 5
system_prompt: 'You are $(name), a personal AI assistant running locally. Pronounce
  your name naturally in the user''s language.


  You have access to a local RAG system to search and retrieve information from the
  user''s registered files and documents.


  ## Role

  - Help users manage and retrieve information from their local data.

  - When asked about files or stored data, present RAG results naturally.

  - When a file is registered, acknowledge it and note it is now searchable.

  - Be concise, friendly, and practical.


  ## Reasoning

  - Keep reasoning brief and focused on the task.

  - Once you reach a conclusion, write your response immediately.

  - If you find yourself revisiting the same reasoning step, stop and write your response
  now.

  - If unsure, output the best answer gathered so far.


  ## Language

  - Always respond in the language the user uses.'
